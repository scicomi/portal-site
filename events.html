<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>イベント | SciComi Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preload" as="script" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://script.google.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap"
        rel="stylesheet">
    <script defer src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
</head>

<body>
    <header class="app-header"></header>

    <datalist id="member-datalist"></datalist>
    <datalist id="experiment-datalist"></datalist>

    <main class="container">
        <div class="page-header">
            <h1 class="page-title" style="margin:0; flex:1;">イベント管理</h1>
            <input id="event-search" class="search-input" type="text" placeholder="タイトル・場所・発表者で検索" oninput="onSearchChange()">
        </div>
        <div class="page-filters">
            <button class="filter-chip active" data-cat="all" onclick="onCategoryFilter('all')">全部</button>
            <button class="filter-chip" data-cat="normal" onclick="onCategoryFilter('normal')">イベント</button>
            <button class="filter-chip" data-cat="other" onclick="onCategoryFilter('other')">その他</button>
            <button class="filter-chip" data-cat="general" onclick="onCategoryFilter('general')">全体MTG</button>
            <button class="filter-chip" data-cat="admin" onclick="onCategoryFilter('admin')">幹部MTG</button>
            <span class="filter-divider"></span>
            <button class="filter-chip active" data-period="upcoming" onclick="onPeriodFilter('upcoming')">今後</button>
            <button class="filter-chip" data-period="past" onclick="onPeriodFilter('past')">過去</button>
            <button class="filter-chip" data-period="all" onclick="onPeriodFilter('all')">全期間</button>
            <button class="filter-chip" id="calendar-toggle-btn" onclick="toggleCalendar()">カレンダー</button>
        </div>

        <section id="calendar-wrapper" class="calendar-section hidden">
            <div id="calendar"></div>
        </section>

        <h3 id="event-list-heading" class="event-list-heading"></h3>
        <div class="table-wrapper">
            <table class="data-table" id="events-table">
                <thead>
                    <tr>
                        <th>日付</th>
                        <th>イベント名</th>
                        <th class="hide-mobile">場所</th>
                        <th class="hide-mobile">時間</th>
                        <th style="width:1px;"></th>
                    </tr>
                </thead>
                <tbody id="events-tbody"><tr><td colspan="5" class="loading-text">読み込み中</td></tr></tbody>
            </table>
        </div>
    </main>

    <!-- Template for Event Item -->
    <template id="event-template">
        <div class="event-card" data-id="">
            <div class="event-summary">
                <div class="summary-left">
                    <span class="event-date-badge"></span>
                    <h3 class="event-title display-mode"></h3>
                    <input type="text" class="edit-mode hidden title-edit sm-input" data-field="Title"
                        onclick="event.stopPropagation()">
                </div>
                <div class="summary-right">
                    <span class="event-time-display display-mode"></span>
                    <span class="expand-icon" style="font-size: 1.2rem; transform: none !important;">→</span>
                </div>
            </div>

            <div class="event-details collapsed">
                <div class="details-content">
                    <div class="event-tab-bar hidden">
                        <button class="event-tab active" data-tab="details" onclick="switchEventTab(this)">イベント詳細</button>
                        <button class="event-tab" data-tab="feedback" onclick="switchEventTab(this)">振り返り</button>
                        <a class="event-tab vote-tab-link" data-field="VoteLink" href="#" onclick="event.stopPropagation()">参加投票 →</a>
                    </div>
                    <section class="detail-section top-section event-tab-pane" data-tab-pane="details">
                        <!-- Meeting Mode Title -->
                        <div class="field-group full-width meeting-only-section">
                            <label>ミーティング名</label>
                            <div class="field-value display-mode" data-field="Title_Display"></div>
                            <div class="edit-mode hidden title-input-wrapper"
                                style="display:flex; align-items:center; gap: 10px;">
                                <span class="text-primary" style="white-space:nowrap;">回数:</span>
                                <input type="number" class="e1-input edit-mode" id="meeting-num-input"
                                    data-field="Meeting_Number" style="width:70px; flex:none;" placeholder="3">
                                <span class="text-primary" style="white-space:nowrap;">名称:</span>
                                <input type="text" class="e1-input edit-mode" id="meeting-name-input" data-field="Title"
                                    style="flex:1;" placeholder="イベント振り返りなど">
                            </div>
                        </div>

                        <!-- Display Table -->
                        <table class="d1-table display-mode-table display-mode">
                            <tr class="event-only-section">
                                <th style="width: 140px;">イベント名</th>
                                <td>
                                    <div class="field-value display-mode" data-field="Title"
                                        class="text-primary" style="font-size: 1.25rem;"></div>
                                </td>
                            </tr>
                            <tr class="event-only-section">
                                <th>対象・人数</th>
                                <td>
                                    <div class="field-value display-mode" data-field="Audience"></div>
                                </td>
                            </tr>
                            <tr>
                                <th style="width: 140px;">場所</th>
                                <td>
                                    <div class="field-value display-mode" data-field="Location"></div>
                                </td>
                            </tr>
                            <tr>
                                <th>日時</th>
                                <td>
                                    <div class="field-value display-mode" data-field="Date_Display"></div>
                                </td>
                            </tr>
                            <tr>
                                <th>イベント時間</th>
                                <td>
                                    <div class="field-value display-mode" data-field="Event_Time"></div>
                                </td>
                            </tr>
                            <tr class="event-only-section">
                                <th>集合・解散</th>
                                <td>
                                    <div class="field-value display-mode" data-field="Gather_Dismiss_Display"></div>
                                </td>
                            </tr>
                            <tr class="event-only-section">
                                <th>実験内容・発表者</th>
                                <td>
                                    <div class="field-value display-mode" data-field="Experiments_Display"></div>
                                </td>
                            </tr>
                            <tr class="event-only-section">
                                <th>スケジュール<br>運搬</th>
                                <td>
                                    <div class="field-value display-mode text-area-view" data-field="Meeting_Logistics"
                                        style="white-space: pre-wrap;"></div>
                                </td>
                            </tr>
                            <tr class="event-only-section">
                                <th>帯同</th>
                                <td>
                                    <div class="field-value display-mode" data-field="Accompany"></div>
                                </td>
                            </tr>
                            <tr>
                                <th><span class="remarks-label-view">備考</span></th>
                                <td>
                                    <div class="field-value display-mode text-area-view" data-field="Remarks"
                                        style="white-space: pre-wrap;"></div>
                                </td>
                            </tr>
                            <tr class="event-only-section">
                                <th>関連ファイル</th>
                                <td>
                                    <div class="file-list display-mode" data-field="Files_Display"></div>
                                </td>
                            </tr>
                            <tr class="event-only-section">
                                <th>書類期限</th>
                                <td>
                                    <ul style="margin:0; padding-left: 20px;">
                                        <li>許可願: 担当 <strong data-field="Admin_Kyoka"></strong> <span
                                                style="margin-left: 10px;">期限: <span class="tag-deadline"
                                                    data-field="Kyoka_Deadline"></span></span></li>
                                        <li style="margin-top: 5px;">報告書: 担当 <strong
                                                data-field="Admin_Houkoku"></strong> <span
                                                style="margin-left: 10px;">期限: <span class="tag-deadline"
                                                    data-field="Houkoku_Deadline"></span></span></li>
                                    </ul>
                                </td>
                            </tr>
                        </table>

                        <!-- Editor UI Forms -->
                        <div class="edit-mode hidden edit-form-wrapper">

                            <div class="e1-group event-only-section">
                                <label class="e1-label">イベント名</label>
                                <input type="text" class="e1-input edit-mode" data-field="Title">
                            </div>

                            <div class="flex-row">
                                <div class="e1-group" style="flex:2;">
                                    <label class="e1-label">場所</label>
                                    <input type="text" class="e1-input edit-mode" data-field="Location">
                                </div>
                                <div class="e1-group event-only-section" style="flex:2;">
                                    <label class="e1-label">対象者・人数</label>
                                    <input type="text" class="e1-input edit-mode" data-field="Audience"
                                        placeholder="例: 小学1〜3年生 40名">
                                </div>
                            </div>

                            <div class="e1-group">
                                <label class="e1-label">日にち</label>
                                <div class="date-range-picker-wrapper">
                                    <input type="text" class="e1-input date-range-display edit-mode" readonly placeholder="クリックして日にちを選択">
                                    <input type="hidden" class="edit-mode" data-field="Date">
                                    <input type="hidden" class="edit-mode" data-field="Date_End">
                                    <div class="date-range-popup hidden"></div>
                                </div>
                            </div>

                            <div class="flex-row">
                                <div class="e1-group" style="flex:1;">
                                    <label class="e1-label">イベント時間</label>
                                    <div class="time-select-group">
                                        <select class="e1-input time-start-select" data-field="Time_Start"></select>
                                        <span>〜</span>
                                        <select class="e1-input time-end-select" data-field="Time_End"></select>
                                    </div>
                                    <input type="hidden" data-field="Event_Time">
                                </div>
                                <div class="e1-group event-only-section" style="flex:1;">
                                    <label class="e1-label">集合時間</label>
                                    <select class="e1-input edit-mode gather-time-select" data-field="Gather_Time"></select>
                                </div>
                                <div class="e1-group event-only-section" style="flex:1;">
                                    <label class="e1-label">解散時間</label>
                                    <select class="e1-input edit-mode dismiss-time-select" data-field="Dismiss_Time"></select>
                                </div>
                            </div>

                            <hr class="event-only-section form-divider">

                            <div class="e1-group event-only-section">
                                <label class="e1-label">実験内容・発表者</label>
                                <div class="experiments-container" data-field="PartsList"></div>
                                <button class="btn-add-exp" onclick="addExperimentRow(this)" type="button">＋ 実験を追加</button>
                            </div>

                            <hr class="event-only-section form-divider">

                            <div class="e1-group event-only-section">
                                <label class="e1-label">スケジュール・運搬</label>
                                <textarea class="e1-input edit-mode" data-field="Meeting_Logistics" rows="5"></textarea>
                            </div>

                            <div class="e1-group event-only-section">
                                <label class="e1-label">帯同（コーディネーター・アドバイザー）</label>
                                <div class="admin-tag-container edit-mode" data-admin-field="Accompany"></div>
                            </div>

                            <div class="e1-group">
                                <label class="e1-label remarks-label-edit">備考</label>
                                <textarea class="e1-input edit-mode" data-field="Remarks" rows="4"></textarea>
                            </div>

                            <div class="e1-group event-only-section">
                                <label class="e1-label">関連ファイル</label>
                                <div class="file-upload-area">
                                    <div class="file-drop-zone"
                                        ondrop="handleDrop(event)"
                                        ondragover="allowDrop(event)"
                                        ondragenter="this.classList.add('dragover')"
                                        ondragleave="this.classList.remove('dragover')"
                                        onclick="this.parentElement.querySelector('.file-input-hidden').click()">
                                        <p style="margin:0; font-weight:bold;">ファイルをここにドラッグ＆ドロップ</p>
                                        <p style="margin:5px 0 0 0; font-size:0.85rem;">またはクリックして選択 (上限 10MB/ファイル)</p>
                                    </div>
                                    <input type="file" class="file-input-hidden" multiple style="display:none;" onchange="handleFileSelect(this)">
                                    <div class="file-list-edit"></div>
                                </div>
                            </div>

                            <div class="e1-group event-only-section">
                                <label class="e1-label">書類期限（日付は自動計算されます）</label>
                                <div class="deadline-grid">
                                    <div>
                                        <label
                                            class="text-label" style="font-size:0.85rem; display:block; margin-bottom:4px;">許可願
                                            (担当)</label>
                                        <div class="admin-tag-container edit-mode" data-admin-field="Admin_Kyoka"></div>
                                    </div>
                                    <div>
                                        <label
                                            class="text-label" style="font-size:0.85rem; display:block; margin-bottom:4px;">報告書
                                            (担当)</label>
                                        <div class="admin-tag-container edit-mode" data-admin-field="Admin_Houkoku"></div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </section>

                    <section class="event-tab-pane hidden" data-tab-pane="feedback">
                        <div class="series-feedback-history hidden" data-field="SeriesFeedback"></div>
                        <h3 class="feedback-section-label event-feedback-label">イベント・会場の振り返り</h3>
                        <div class="e1-group">
                            <label class="e1-label">良かった点</label>
                            <textarea class="e1-input fb-tab-positives" rows="3" placeholder="会場・運営で良かったこと"></textarea>
                        </div>
                        <div class="e1-group">
                            <label class="e1-label">改善点</label>
                            <textarea class="e1-input fb-tab-reflections" rows="3" placeholder="会場・運営の改善点"></textarea>
                        </div>
                        <div class="event-only-section">
                            <h3 class="feedback-section-label exp-feedback-label">実験の振り返り</h3>
                            <p class="text-muted" style="font-size:0.82rem; margin:0 0 10px;">
                                各実験の気づきを記録できます。入力した内容は実験の詳細ページに蓄積されます。
                            </p>
                            <div class="exp-feedback-container" data-field="ExpFeedback_Tab"></div>
                        </div>
                        <div style="margin-top:20px; text-align:right;">
                            <button class="btn btn-primary-solid" style="width:auto; padding:8px 24px;" onclick="saveFeedbackFromTab()">振り返りを保存</button>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </template>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-content" id="category-selection-modal" role="dialog" aria-modal="true" aria-labelledby="cat-modal-title">
            <h2 id="cat-modal-title">新規イベント作成</h2>
            <p>イベントの種類を選択してください。</p>
            <div class="category-buttons">
                <button class="btn btn-category cat-normal-btn" onclick="startNewEvent('normal')">イベント</button>
                <button class="btn btn-category cat-other-btn" onclick="startNewEvent('other')">その他</button>
                <button class="btn btn-category cat-general-btn" onclick="startNewEvent('general')">全体ミーティング</button>
                <button class="btn btn-category cat-admin-btn" onclick="startNewEvent('admin')">幹部ミーティング</button>
            </div>

            <div class="text-center-or">または</div>

            <div class="e1-group">
                <label class="e1-label">過去イベントから複製</label>
                <select id="template-source" class="e1-input" onchange="onTemplateSelect(this.value)">
                    <option value="">-- 過去イベントを選んで複製 --</option>
                </select>
            </div>

            <button class="btn btn-text mt-2" onclick="closeModal()">キャンセル</button>
        </div>

        <div class="modal-content event-card hidden large-modal" id="new-event-edit-modal" role="dialog" aria-modal="true" aria-labelledby="event-modal-title">
            <div class="modal-header">
                <h2 id="event-modal-title">イベント詳細</h2>
                <div class="action-buttons-top" id="modal-action-buttons">
                    <button class="btn btn-text" onclick="closeModal()">閉じる</button>
                </div>
            </div>

            <div class="modal-body">
                <div id="new-event-form-container"></div>
            </div>
        </div>
    </div>

    <!-- FAB -->
    <button class="fab" onclick="openNewEventModal()" title="新規イベント" aria-label="新規イベント">+</button>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="app.js"></script>
    <script src="script.js"></script>
</body>

</html>
