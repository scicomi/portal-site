<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>実験内容 | SciComi Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header"></header>

    <main class="container">
        <div class="page-section-actions">
            <h1 class="page-title" style="margin:0; flex:1;">実験内容</h1>
            <input id="exp-search" class="search-input" type="text" placeholder="名前・材料で検索" oninput="onExpSearch()">
            <button class="btn-primary-solid" style="width: auto; padding: 8px 16px;" onclick="openExpModal()">+ 実験を追加</button>
        </div>

        <div class="page-section-actions">
            <button class="filter-chip active" data-cat="all" onclick="switchExpTab('all')">全部 <span id="tab-cnt-all">0</span></button>
            <button class="filter-chip" data-cat="workshop" onclick="switchExpTab('workshop')">工作 <span id="tab-cnt-workshop">0</span></button>
            <button class="filter-chip" data-cat="show" onclick="switchExpTab('show')">実験ショー <span id="tab-cnt-show">0</span></button>
            <button class="filter-chip" data-cat="other" onclick="switchExpTab('other')">その他 <span id="tab-cnt-other">0</span></button>
        </div>

        <div class="table-wrapper">
            <table class="data-table" id="experiments-table">
                <thead>
                    <tr>
                        <th>実験名</th>
                        <th>区分</th>
                        <th class="hide-mobile">使用物品</th>
                        <th class="hide-mobile">資料</th>
                        <th style="width:140px;">操作</th>
                    </tr>
                </thead>
                <tbody id="experiments-tbody"></tbody>
            </table>
        </div>

        <!-- 詳細モーダル -->
        <div id="exp-detail-modal" class="modal-overlay hidden">
            <div class="modal-content large-modal exp-detail">
                <div class="modal-header">
                    <h2 id="exp-detail-title">&mdash;</h2>
                    <div class="action-buttons-top">
                        <button class="btn btn-text" onclick="closeExpDetail()">閉じる</button>
                        <button class="btn btn-secondary" onclick="editCurrentExp()">編集</button>
                        <button class="btn btn-danger" onclick="deleteCurrentExp()">削除</button>
                    </div>
                </div>
                <div class="modal-body" id="exp-detail-body"></div>
            </div>
        </div>

        <!-- 編集モーダル -->
        <div id="exp-edit-modal" class="modal-overlay hidden">
            <div class="modal-content large-modal">
                <div class="modal-header">
                    <h2 id="exp-edit-title">実験を追加</h2>
                </div>
                <div class="modal-body">
                    <div class="e1-group">
                        <label class="e1-label">実験名 *</label>
                        <input id="ex-name" class="e1-input" type="text" placeholder="例: スライム">
                    </div>
                    <div class="e1-group">
                        <label class="e1-label">カテゴリ *</label>
                        <select id="ex-category" class="e1-input">
                            <option value="workshop">工作</option>
                            <option value="show">実験ショー</option>
                            <option value="other">その他</option>
                        </select>
                    </div>
                    <div class="e1-group">
                        <label class="e1-label">使用物品（1行1つ）</label>
                        <textarea id="ex-materials" class="e1-input" rows="5" placeholder="アルギン酸ナトリウム&#10;乳酸カルシウム&#10;..."></textarea>
                    </div>
                    <div class="e1-group">
                        <label class="e1-label">事前準備</label>
                        <textarea id="ex-preparation" class="e1-input" rows="4"></textarea>
                    </div>
                    <div class="e1-group">
                        <label class="e1-label">発表の流れ</label>
                        <textarea id="ex-flow" class="e1-input" rows="4"></textarea>
                    </div>
                    <div class="e1-group">
                        <label class="e1-label">注意事項</label>
                        <textarea id="ex-notes" class="e1-input" rows="4"></textarea>
                    </div>
                    <div class="e1-group">
                        <label class="e1-label">スライド/資料URL</label>
                        <input id="ex-slides" class="e1-input" type="text" placeholder="https://...">
                    </div>
                    <div class="action-buttons">
                        <button class="btn btn-text" onclick="closeExpEdit()">キャンセル</button>
                        <button class="btn btn-primary-solid" style="width:auto;" onclick="saveExp()">保存</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="app.js"></script>
    <script src="experiments.js"></script>
</body>
</html>
