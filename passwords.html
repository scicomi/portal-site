<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード一覧 | SciComi Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header"></header>

    <main class="container">
        <!-- 管理者でない場合に表示するブロック -->
        <div id="pw-denied" class="pw-denied" style="display:none;">
            <h1 class="page-title">パスワード一覧</h1>
            <p>このページは管理者専用です。幹部パスワードで認証してください。</p>
            <button class="btn btn-primary-solid" style="width:auto;padding:8px 20px;" onclick="showAdminAuthModal(() => location.reload())">管理者認証</button>
        </div>

        <!-- 管理者向け本体 -->
        <div id="pw-admin-body" style="display:none;">
            <div class="page-section-actions">
                <h1 class="page-title" style="margin:0; flex:1;">パスワード一覧</h1>
                <input id="pw-search" class="search-input" type="text" placeholder="サービス名・IDで検索" oninput="onPwSearch()">
                <button class="btn-primary-solid" style="width: auto; padding: 8px 16px;" onclick="openPwModal()">+ 追加</button>
            </div>

            <p class="pw-security-note">
                ⚠ 外部サービスのログイン情報です。<strong>管理者のみ閲覧できます。</strong>画面共有・スクリーンショットの取り扱いに注意してください。
            </p>

            <div id="pw-list" class="pw-list"></div>
        </div>

        <!-- 追加・編集モーダル -->
        <div id="pw-modal-edit" class="modal-overlay hidden">
            <div class="modal-content" style="max-width: 500px;">
                <h2 id="pw-modal-title">パスワードを追加</h2>
                <div class="e1-group">
                    <label class="e1-label">サービス名 *</label>
                    <input id="pw-f-name" class="e1-input" type="text" placeholder="例: モノタロウ">
                </div>
                <div class="e1-group">
                    <label class="e1-label">URL</label>
                    <input id="pw-f-url" class="e1-input" type="text" placeholder="例: https://www.monotaro.com/">
                </div>
                <div class="e1-group">
                    <label class="e1-label">ログインID</label>
                    <input id="pw-f-loginid" class="e1-input" type="text" placeholder="例: scicomi@example.com" autocomplete="off">
                </div>
                <div class="e1-group">
                    <label class="e1-label">パスワード</label>
                    <div style="display:flex;gap:8px;">
                        <input id="pw-f-password" class="e1-input" type="password" placeholder="パスワード" autocomplete="new-password" style="flex:1;">
                        <button type="button" class="btn btn-secondary" style="width:auto;padding:8px 12px;" onclick="togglePwField('pw-f-password', this)" title="表示切替">👁</button>
                    </div>
                </div>
                <div class="e1-group">
                    <label class="e1-label">メモ</label>
                    <textarea id="pw-f-note" class="e1-input" rows="2" placeholder="例: 部費の備品購入用アカウント"></textarea>
                </div>
                <div class="action-buttons">
                    <button class="btn btn-text" onclick="closePwModal()">キャンセル</button>
                    <button class="btn btn-primary-solid" style="width:auto;" onclick="savePwEntry()">保存</button>
                </div>
            </div>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="app.js"></script>
    <script src="passwords.js"></script>
</body>
</html>
