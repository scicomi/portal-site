<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot | SciComi Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header"></header>

    <main class="bot-container">
        <div class="bot-gauge" id="bot-gauge">
            <div class="bot-gauge-header">
                <span class="bot-gauge-label">Gemini API 使用量</span>
                <span class="bot-gauge-count" id="bot-gauge-count">— / —</span>
                <button class="bot-settings-btn" id="bot-settings-btn" title="API設定">⚙</button>
            </div>
            <div class="bot-gauge-track">
                <div class="bot-gauge-fill" id="bot-gauge-fill"></div>
            </div>
        </div>

        <div class="bot-messages" id="bot-messages"></div>

        <div class="bot-input-area">
            <input type="text" id="bot-input" class="bot-input" placeholder="質問を入力… 例: 「来月のイベントは？」" autocomplete="off">
            <button class="bot-send-btn" id="bot-send-btn">送信</button>
        </div>
    </main>

    <!-- Gemini設定は管理者設定モーダル（app.js）で管理 -->

    <!-- 実験 詳細モーダル（Bot用・実験ページと同じ内容） -->
    <div id="bot-exp-detail-modal" class="modal-overlay hidden">
        <div class="modal-content large-modal exp-detail">
            <div class="modal-header">
                <h2 id="bot-exp-detail-title">&mdash;</h2>
                <div class="action-buttons-top">
                    <a id="bot-exp-detail-link" class="btn btn-secondary" href="experiments.html">実験ページで開く</a>
                    <button class="btn btn-text" onclick="closeBotExpDetail()">閉じる</button>
                </div>
            </div>
            <div class="modal-body" id="bot-exp-detail-body"></div>
        </div>
    </div>

    <!-- イベント 詳細モーダル（Bot用・イベントページと同じ内容） -->
    <div id="bot-event-detail-modal" class="modal-overlay hidden">
        <div class="modal-content large-modal exp-detail">
            <div class="modal-header">
                <h2 id="bot-event-detail-title">&mdash;</h2>
                <div class="action-buttons-top">
                    <a id="bot-event-detail-link" class="btn btn-secondary" href="events.html">イベントページで開く</a>
                    <button class="btn btn-text" onclick="closeBotEventDetail()">閉じる</button>
                </div>
            </div>
            <div class="modal-body" id="bot-event-detail-body"></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="app.js"></script>
    <script src="bot.js"></script>
</body>
</html>
