<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot | SciComi Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header"></header>

    <main class="bot-container">
        <div class="bot-gauge" id="bot-gauge">
            <div class="bot-gauge-header">
                <span class="bot-gauge-label">Gemini API 使用量</span>
                <span class="bot-gauge-count" id="bot-gauge-count">— / —</span>
                <button class="bot-settings-btn" id="bot-settings-btn" title="API設定">⚙</button>
            </div>
            <div class="bot-gauge-track">
                <div class="bot-gauge-fill" id="bot-gauge-fill"></div>
            </div>
        </div>

        <div class="bot-messages" id="bot-messages"></div>

        <div class="bot-input-area">
            <input type="text" id="bot-input" class="bot-input" placeholder="質問を入力… 例: 「来月のイベントは？」" autocomplete="off">
            <button class="bot-send-btn" id="bot-send-btn">送信</button>
        </div>
    </main>

    <div class="modal-overlay hidden" id="gemini-settings-modal">
        <div class="modal-content" style="max-width:480px;">
            <h2>Gemini API 設定</h2>
            <p style="color:#666;font-size:0.9rem;margin-bottom:16px;">
                <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">Google AI Studio</a>
                でAPIキーを取得し、下に貼り付けてください。<br>
                APIキーはこのブラウザのlocalStorageに保存されます。
            </p>
            <div class="e1-group">
                <label class="e1-label">APIキー</label>
                <input type="password" id="gemini-key-input" class="e1-input" placeholder="AIza...">
            </div>
            <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
                <button class="btn btn-secondary" id="gemini-settings-cancel">キャンセル</button>
                <button class="btn btn-primary-solid" id="gemini-settings-save" style="width:auto;padding:8px 24px;">保存</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="app.js"></script>
    <script src="bot.js"></script>
</body>
</html>
