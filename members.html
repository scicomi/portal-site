<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>メンバー | SciComi Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header"></header>

    <main class="container">
        <div class="page-section-actions">
            <h1 class="page-title" style="margin:0; flex:1;">メンバーリスト</h1>
            <button class="filter-chip admin-only" onclick="openYearCopyModal()">新年度一括登録</button>
            <button class="filter-chip admin-only" id="edit-mode-btn" onclick="toggleEditMode()">編集</button>
        </div>

        <div class="page-section-actions">
            <select id="fiscal-year-select" class="e1-input" style="width:auto; padding:6px 12px;" onchange="onFiscalYearChange()"></select>
            <input id="member-search" class="search-input" type="text" placeholder="名前・役職で検索" oninput="onMemberSearch()" style="flex:1;">
            <button id="add-member-btn" class="btn-primary-solid" style="width: auto; padding: 8px 16px;" onclick="openMemberModal()">+ メンバー追加</button>
        </div>

        <div class="page-section-actions" id="role-filter-row">
            <span class="text-muted" style="font-size:0.85rem;">区分で絞り込み:</span>
            <button class="filter-chip active" data-role="member" onclick="setRoleFilter('member')">メンバー</button>
            <button class="filter-chip" data-role="coordinator" onclick="setRoleFilter('coordinator')">コーディネーター</button>
            <button class="filter-chip" data-role="adviser" onclick="setRoleFilter('adviser')">アドバイザー</button>
        </div>

        <div class="page-section-actions" id="grade-filter-row" style="display:none;">
            <span class="text-muted" style="font-size:0.85rem;">学年で絞り込み:</span>
            <span id="grade-filter-chips" style="display:flex; gap:8px; flex-wrap:wrap;"></span>
        </div>

        <div class="table-wrapper">
            <table class="data-table" id="members-table">
                <thead>
                    <tr>
                        <th>学籍/教職員番号</th>
                        <th>名前</th>
                        <th>所属</th>
                        <th class="hide-mobile">メールアドレス</th>
                    </tr>
                </thead>
                <tbody id="members-tbody"><tr><td colspan="4" class="loading-text">読み込み中</td></tr></tbody>
            </table>
        </div>

        <!-- メンバー追加/編集モーダル -->
        <div id="member-modal" class="modal-overlay hidden">
            <div class="modal-content" style="max-width: 500px;" role="dialog" aria-modal="true" aria-labelledby="member-modal-title">
                <h2 id="member-modal-title">メンバー追加</h2>
                <div class="e1-group">
                    <label class="e1-label">名前 *</label>
                    <input id="mb-name" class="e1-input" type="text" placeholder="例: 山田 太郎">
                </div>
                <div class="e1-group">
                    <label class="e1-label">ふりがな</label>
                    <input id="mb-furigana" class="e1-input" type="text" placeholder="例: やまだ たろう">
                </div>
                <div class="e1-group">
                    <label class="e1-label">役職</label>
                    <select id="mb-role" class="e1-input" onchange="onRoleSelectChange()"></select>
                </div>
                <div class="e1-group" id="mb-email-group">
                    <label class="e1-label">メールアドレス</label>
                    <input id="mb-email" class="e1-input" type="email" placeholder="例: name@example.com">
                </div>
                <div class="e1-group">
                    <label class="e1-label">学生証番号 / 教職員番号</label>
                    <input id="mb-student-id" class="e1-input" type="text" placeholder="例: 5CSC1234">
                </div>
                <div class="e1-group" id="mb-affiliation-group">
                    <label class="e1-label">所属</label>
                    <input id="mb-affiliation" class="e1-input" type="text" placeholder="例: 理系教育センター">
                </div>
                <div class="e1-group">
                    <label class="e1-label">年度</label>
                    <select id="mb-fiscal-year" class="e1-input"></select>
                </div>
                <div class="e1-group">
                    <label class="e1-label">メモ</label>
                    <textarea id="mb-note" class="e1-input" rows="2"></textarea>
                </div>
                <div class="action-buttons">
                    <button id="mb-delete-btn" class="btn btn-text text-danger hidden" onclick="deleteMemberFromModal()">削除</button>
                    <span style="flex:1;"></span>
                    <button class="btn btn-text" onclick="closeMemberModal()">キャンセル</button>
                    <button class="btn btn-primary-solid" style="width:auto;" onclick="saveMember()">保存</button>
                </div>
            </div>
        </div>

        <!-- 年度一括登録モーダル -->
        <div id="year-copy-modal" class="modal-overlay hidden">
            <div class="modal-content" style="max-width: 600px;" role="dialog" aria-modal="true" aria-labelledby="year-copy-title">
                <h2 id="year-copy-title">新年度メンバー登録</h2>
                <p class="text-label" style="font-size:0.9rem; margin-top:0;">前年度のメンバーを新年度に引き継ぎます。</p>
                <div class="e1-group">
                    <label class="e1-label">コピー元年度</label>
                    <select id="yc-source-year" class="e1-input" onchange="renderYearCopyMembers()"></select>
                </div>
                <div class="e1-group">
                    <label class="e1-label">登録先年度</label>
                    <select id="yc-target-year" class="e1-input"></select>
                </div>
                <div style="margin:12px 0; display:flex; gap:8px;">
                    <button class="tbl-btn" onclick="yearCopySelectAll(true)">全選択</button>
                    <button class="tbl-btn" onclick="yearCopySelectAll(false)">全解除</button>
                </div>
                <div id="yc-member-list" style="max-height:300px; overflow-y:auto; border:1px solid var(--border-light); border-radius:8px;"></div>
                <div class="action-buttons" style="margin-top:16px;">
                    <button class="btn btn-text" onclick="closeYearCopyModal()">キャンセル</button>
                    <button class="btn btn-primary-solid" style="width:auto;" onclick="executeYearCopy()">登録</button>
                </div>
            </div>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="app.js"></script>
    <script src="members.js"></script>
</body>
</html>
